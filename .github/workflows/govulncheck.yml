name: Govulncheck

on:
  push:
    branches:
      - main
      - release-*
  pull_request: {}
  workflow_dispatch: {}
  schedule:
    # Weekly, Mondays 06:00 UTC — catches newly disclosed vulns in pinned deps.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # go.mod pins `toolchain go1.26.5`; with GOTOOLCHAIN=auto this
          # base version transparently fetches the module's toolchain.
          go-version: '1.25'
          check-latest: true

      - name: Run Govulncheck
        # `make vuln` runs `govulncheck ./...` and exits non-zero on findings;
        # that non-zero exit is the intended gate — do not soften it.
        run: make vuln

name: Changelog

on:
  # On PRs, verify CHANGELOG.md is in sync with the commit history (fails if a
  # regeneration would change it). We deliberately do NOT verify on push to
  # main: this repo rebase-merges, which rewrites commit SHAs and resolves PR
  # links post-merge, so a byte-diff on main would spuriously fail every merge.
  pull_request: {}
  # On a version tag, regenerate the full changelog and open a PR with the
  # release notes (handled by the `release` job, gated on github.ref_type).
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch: {}

# Least-privilege by default; the release job elevates its own permissions.
permissions:
  contents: read

jobs:
  verify:
    # Only verify on PRs and branch pushes, not on tags.
    if: github.ref_type != 'tag'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # git-cliff needs full history + tags to compute sections.
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --output CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify CHANGELOG.md is up to date
        run: |
          if ! git diff --quiet -- CHANGELOG.md; then
            echo "::error::CHANGELOG.md is out of date. Regenerate it with:"
            echo "::error::  git cliff -c cliff.toml -o CHANGELOG.md"
            echo "----- diff -----"
            git --no-pager diff -- CHANGELOG.md
            exit 1
          fi
          echo "CHANGELOG.md is up to date."

  release:
    # On a version tag, regenerate the changelog and open a PR with the notes.
    if: github.ref_type == 'tag'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --output CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open changelog update PR
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: changelog/${{ github.ref_name }}
          base: main
          commit-message: ":memo: docs(changelog): update for ${{ github.ref_name }}"
          title: ":memo: docs(changelog): update for ${{ github.ref_name }}"
          body: |
            Automated changelog regeneration for `${{ github.ref_name }}`,
            generated by `git-cliff` from the gitmoji + Conventional Commit history.
          labels: |
            automated
            documentation

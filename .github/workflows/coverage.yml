name: Coverage

on:
  push:
    branches:
      - main
      - release-*
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Initializes the `build` submodule required by the make targets.
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # go.mod pins `toolchain go1.26.5`; with GOTOOLCHAIN=auto this
          # base version transparently fetches the module's toolchain.
          go-version: '1.25'
          check-latest: true

      - name: Run Coverage
        # `make coverage` emits cover.out (scoped to ./config/...) and then
        # enforces the COVERAGE_MIN floor. cover.out is written before the
        # floor check, so it exists even if the floor trips.
        run: make coverage

      - name: Upload Coverage to Codecov
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          files: cover.out
          flags: config
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

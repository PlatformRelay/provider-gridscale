name: Publish Provider Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string to use while publishing the package (e.g. v1.0.0-alpha.1)"
        default: ''
        required: false
      go-version:
        description: 'Go version to use if building needs to be done'
        default: '1.24'
        required: false

jobs:
  publish-provider-package:
    uses: crossplane-contrib/provider-workflows/.github/workflows/publish-provider.yml@451c4dc6ad3691b0a702a997a0ac24e8bbc8bbaa # main
    with:
      repository: provider-gridscale
      registry_org: platformrelay
      version: ${{ github.event.inputs.version }}
      go-version: ${{ github.event.inputs.go-version }}
      cleanup-disk: true
    secrets:
      # Reusable upstream login uses username=org ("PlatformRelay") + this secret.
      # github.token fails that login (actor username required) — proven 2026-07-16
      # run 29509707113. Keep a classic PAT here with write:packages + read:packages.
      # sign-and-sbom below uses github.token against the linked package instead.
      GHCR_PAT: ${{ secrets.GHCR_PAT }}
      XPKG_MIRROR_TOKEN: ${{ secrets.XPKG_MIRROR_TOKEN }}
      XPKG_MIRROR_ACCESS_ID: ${{ secrets.XPKG_MIRROR_ACCESS_ID }}

  # Supply-chain hardening: keyless (Sigstore OIDC) cosign signature + SBOM
  # attestation for the published provider xpkg. This runs AFTER the reusable
  # publish workflow above and never mutates it — the existing build/push flow
  # is untouched. Scope: signs the ghcr.io/platformrelay artifact only; the
  # xpkg.upbound.io mirror (pushed with separate creds by the reusable
  # workflow) is intentionally out of scope.
  sign-and-sbom:
    needs: publish-provider-package
    # Run even if the reusable publish job reports failure (e.g. the optional
    # xpkg.upbound.io mirror sub-job fails on creds): the ghcr artifact is
    # already pushed by publish-artifacts, so signing must not be coupled to
    # the mirror. The crane-digest step is the real guard (fails cleanly if the
    # version tag was not published).
    if: ${{ !cancelled() && github.event.inputs.version != '' }}
    runs-on: ubuntu-24.04
    # Job-scoped permissions ONLY. A top-level permissions block would also
    # narrow the reusable-workflow job above and could break its push.
    #   id-token: write  -> keyless OIDC identity for Fulcio/Rekor (no key)
    #   packages: write  -> write signature + attestation OCI artifacts to ghcr
    #   contents: read   -> baseline repo read (no checkout needed; all steps
    #                       operate on the published registry ref)
    permissions:
      id-token: write
      packages: write
      contents: read
    env:
      IMAGE: ghcr.io/platformrelay/provider-gridscale
      VERSION: ${{ github.event.inputs.version }}
    steps:
      # Signing/SBOM keys off inputs.version (an explicit release tag). This is
      # exactly what the reusable workflow's mirror step keys off, so it is the
      # proven-consistent path. If version is empty the reusable workflow
      # derives a git-describe version we cannot reliably reproduce here, so we
      # no-op with a clear message rather than sign the wrong (or no) digest.
      - name: Check version input
        id: guard
        run: |
          set -euo pipefail
          if [ -z "${VERSION}" ]; then
            echo "::warning::No explicit version input provided; skipping keyless signing + SBOM - the published package will be UNSIGNED. Re-dispatch with an explicit version to sign."
            echo "The reusable publish workflow derives a git-describe version that" >&2
            echo "cannot be reliably reproduced here. Re-run with an explicit version" >&2
            echo "(e.g. v1.0.0) to sign and attest the published package." >&2
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: steps.guard.outputs.proceed == 'true'
        # Keyless removes the signing key, but cosign still writes the
        # signature/attestation OCI artifacts to ghcr. Use GITHUB_TOKEN now that
        # the org package is linked to this repo with Actions read/write.
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Install crane
        if: steps.guard.outputs.proceed == 'true'
        uses: imjasonh/setup-crane@feee3b6bb0d4c68370f256a4502498c9227e5c6b # v0.7

      - name: Install cosign
        if: steps.guard.outputs.proceed == 'true'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Resolve the pushed tag to its immutable (index) digest and sign BY
      # DIGEST. set -euo pipefail makes a missing tag (i.e. a wrong version)
      # fail the job red instead of silently signing nothing — this is the only
      # correctness signal available without an end-to-end test.
      - name: Resolve image digest
        if: steps.guard.outputs.proceed == 'true'
        id: digest
        run: |
          set -euo pipefail
          DIGEST="$(crane digest "${IMAGE}:${VERSION}")"
          echo "Resolved ${IMAGE}:${VERSION} -> ${DIGEST}"
          echo "ref=${IMAGE}@${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Keyless cosign sign
        if: steps.guard.outputs.proceed == 'true'
        env:
          REF: ${{ steps.digest.outputs.ref }}
        run: |
          set -euo pipefail
          cosign sign --yes "${REF}"

      - name: Generate SBOM (SPDX JSON)
        if: steps.guard.outputs.proceed == 'true'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.digest.outputs.ref }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true

      - name: Attest SBOM with cosign (keyless)
        if: steps.guard.outputs.proceed == 'true'
        env:
          REF: ${{ steps.digest.outputs.ref }}
        run: |
          set -euo pipefail
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${REF}"

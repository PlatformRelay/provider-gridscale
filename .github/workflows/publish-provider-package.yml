name: Publish Provider Package

# Local publish/sign (kollect/mkurator model): github.token + packages:write +
# keyless cosign. No personal PAT. Upstream crossplane-contrib reusable workflow
# requires a secret named GHCR_PAT and cannot receive github.token across repos
# (arrives empty → "Password required") — so we inline the publish steps here.
# Upbound mirror still uses the org robot token pair (XPKG_MIRROR_*).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string to use while publishing the package (e.g. v1.0.0-alpha.1)"
        default: ''
        required: false
      go-version:
        description: 'Go version to use if building needs to be done'
        default: '1.26.5'
        required: false

env:
  DOCKER_BUILDX_VERSION: 'v0.20.1'
  CROSSPLANE_REGORG: ghcr.io/platformrelay
  MIRROR_REGORG: xpkg.upbound.io/platformrelay
  IMAGE: ghcr.io/platformrelay/provider-gridscale

# Scorecard Token-Permissions: deny-by-default at the workflow root. Jobs that
# push to GHCR elevate packages:write explicitly.
permissions:
  contents: read

jobs:
  publish-artifacts:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Cleanup Disk
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          tool-cache: true
          large-packages: false
          swap-storage: false

      - name: Setup QEMU
        uses: docker/setup-qemu-action@2b82ce82d56a2a04d2637cd93a637ae1b359c0a7 # v2
        with:
          platforms: all

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@885d1462b80bc1c1c7f0b00334ad271f09369c55 # v2
        with:
          version: ${{ env.DOCKER_BUILDX_VERSION }}
          install: true

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4
        with:
          submodules: true
          # Prefer the release tag when publishing a named version so the
          # artifact matches the git tag (same as the upstream reusable job).
          ref: ${{ github.event.inputs.version != '' && github.event.inputs.version || github.ref }}

      - name: Fetch History
        run: git fetch --prune --unshallow || true

      - name: Setup Go
        uses: actions/setup-go@6edd4406fa81c3da01a34fa6f6343087c207a568 # v3
        with:
          go-version: ${{ github.event.inputs.go-version }}

      - name: Find the Go Build Cache
        id: go_cache
        run: |
          echo "cache=$(make go.cachedir)" >> "$GITHUB_OUTPUT"
          echo "mod_cache=$(make go.mod.cachedir)" >> "$GITHUB_OUTPUT"

      - name: Cache the Go Build Cache
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4
        with:
          path: ${{ steps.go_cache.outputs.cache }}
          key: ${{ runner.os }}-build-publish-artifacts-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-build-publish-artifacts-

      - name: Cache Go Dependencies
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4
        with:
          path: ${{ steps.go_cache.outputs.mod_cache }}
          key: ${{ runner.os }}-pkg-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-pkg-

      - name: Vendor Dependencies
        run: make vendor vendor.check

      - name: Build Artifacts
        run: |
          make -j \
            XPKG_REG_ORGS="${{ env.CROSSPLANE_REGORG }}" \
            XPKG_REG_ORGS_NO_PROMOTE="${{ env.CROSSPLANE_REGORG }}" \
            BRANCH_NAME="main" \
            ${{ github.event.inputs.version != '' && format('VERSION={0}', github.event.inputs.version) || '' }} \
            build.all
        env:
          BUILD_ARGS: "--load"

      - name: Publish Artifacts
        run: |
          make -j \
            XPKG_REG_ORGS="${{ env.CROSSPLANE_REGORG }}" \
            XPKG_REG_ORGS_NO_PROMOTE="${{ env.CROSSPLANE_REGORG }}" \
            BRANCH_NAME="main" \
            ${{ github.event.inputs.version != '' && format('VERSION={0}', github.event.inputs.version) || '' }} \
            publish

      # D-020-FU: `up alpha xpkg append` is the only way to add extensions (crossplane
      # xpkg build has no --extensions-root). The build system's $(UP) is a dangling
      # no-op, so install a pinned `up` on PATH here. Pinned by version; from the
      # official Upbound CDN (same trust model as the other curl-installed tools).
      - name: Install up CLI (pinned, for extensions append)
        if: ${{ github.event.inputs.version != '' }}
        env:
          UP_VERSION: v0.51.0
        run: |
          set -euo pipefail
          curl -fsSLo /usr/local/bin/up \
            "https://cli.upbound.io/stable/${UP_VERSION}/bin/linux_amd64/up"
          chmod +x /usr/local/bin/up
          up version --client

      # D-020-FU: append the marketplace extensions (icon/readme) to the just-pushed
      # release index so the FINAL digest carries them — the sign-and-sbom job then
      # signs THAT digest. `up alpha xpkg append` rewrites the tag to a new digest and
      # invalidates any prior signature, so it must run here (after publish, before
      # sign), never after signing (the v0.1.1 trap; see decisions.md D-020/D-020-FU).
      # Only for named releases: unversioned dev builds are neither signed nor listed.
      - name: Append marketplace extensions to release index (D-020-FU)
        if: ${{ github.event.inputs.version != '' }}
        run: |
          make \
            XPKG_REG_ORGS="${{ env.CROSSPLANE_REGORG }}" \
            VERSION=${{ github.event.inputs.version }} \
            xpkg.append.extensions

  mirror-to-upbound:
    needs: publish-artifacts
    runs-on: ubuntu-24.04
    if: ${{ github.event.inputs.version != '' }}
    permissions:
      contents: read
      packages: read
    steps:
      - name: Check mirror credentials
        id: guard
        env:
          MIRROR_ID: ${{ secrets.XPKG_MIRROR_ACCESS_ID }}
          MIRROR_TOKEN: ${{ secrets.XPKG_MIRROR_TOKEN }}
        run: |
          if [ -z "${MIRROR_ID}" ] || [ -z "${MIRROR_TOKEN}" ]; then
            echo "::warning::XPKG_MIRROR_* secrets unset; skipping Upbound mirror"
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: steps.guard.outputs.proceed == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Log in to Upbound
        if: steps.guard.outputs.proceed == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: xpkg.upbound.io
          username: ${{ secrets.XPKG_MIRROR_ACCESS_ID }}
          password: ${{ secrets.XPKG_MIRROR_TOKEN }}

      - name: Setup crane
        if: steps.guard.outputs.proceed == 'true'
        uses: imjasonh/setup-crane@feee3b6bb0d4c68370f256a4502498c9227e5c6b # v0.7

      - name: Mirror to xpkg.upbound.io
        if: steps.guard.outputs.proceed == 'true'
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          crane copy \
            "${CROSSPLANE_REGORG}/provider-gridscale:${VERSION}" \
            "${MIRROR_REGORG}/provider-gridscale:${VERSION}" \
            --allow-nondistributable-artifacts

  sign-and-sbom:
    needs: publish-artifacts
    # D-020-FU: gate on publish-artifacts SUCCESS (not always()). That job now runs
    # the extensions append; if it fails, the tag would still point at the pre-append
    # extension-less digest, and an always()-gated sign would sign THAT — reviving the
    # very bug this fix kills. Only sign when build+publish+append all succeeded. The
    # "Verify extensions present" step below is the belt-and-suspenders backstop.
    if: ${{ success() && github.event.inputs.version != '' }}
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      packages: write
      contents: read
    env:
      VERSION: ${{ github.event.inputs.version }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Install crane
        uses: imjasonh/setup-crane@feee3b6bb0d4c68370f256a4502498c9227e5c6b # v0.7

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Resolve image digest
        id: digest
        run: |
          set -euo pipefail
          DIGEST="$(crane digest "${IMAGE}:${VERSION}")"
          echo "Resolved ${IMAGE}:${VERSION} -> ${DIGEST}"
          echo "ref=${IMAGE}@${DIGEST}" >> "$GITHUB_OUTPUT"

      # D-020-FU fail-closed: never sign an extension-less digest. Appended
      # marketplace extensions show up as `io.crossplane.xpkg` layer annotations.
      # Schemes observed in the wild:
      #   - v0.1.1-era: a single combined layer with value `upbound`
      #   - `up` v0.51.0: per-extension layers (`icons`, `readme`, `docs`, …)
      # Accept either. Refuse only when neither scheme is present.
      - name: Verify extensions present before signing (D-020-FU)
        env:
          REF: ${{ steps.digest.outputs.ref }}
        run: |
          set -euo pipefail
          children="$(crane manifest "${REF}" | jq -r '.manifests[]?.digest // empty')"
          if [ -z "${children}" ]; then
            # Single-arch package: inspect its own layers.
            children="${REF#*@}"
          fi
          missing=0
          for child in ${children}; do
            case "${child}" in
              sha256:*) mref="${IMAGE}@${child}" ;;
              *)        mref="${child}" ;;
            esac
            manifest="$(crane manifest "${mref}")"
            # Combined "upbound" layer OR discrete marketplace extension layers.
            if printf '%s' "${manifest}" | jq -e '
              [.layers[]?.annotations["io.crossplane.xpkg"] // empty]
              | map(select(. == "upbound" or . == "icons" or . == "readme"))
              | length > 0
            ' >/dev/null; then
              echo "OK: ${mref} carries marketplace extensions (upbound and/or icons/readme)"
              printf '%s' "${manifest}" | jq -c '[.layers[]?.annotations["io.crossplane.xpkg"] // empty]'
            else
              echo "::error::${mref} is MISSING marketplace extensions (no upbound/icons/readme layer)"
              echo "Layer annotations actually present on ${mref}:"
              printf '%s' "${manifest}" | jq -c '[.layers[]?.annotations // {}]'
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            echo "::error::Refusing to sign — resolved digest ${REF} lacks appended extensions (D-020-FU)."
            exit 1
          fi

      - name: Keyless cosign sign
        env:
          REF: ${{ steps.digest.outputs.ref }}
        run: |
          set -euo pipefail
          cosign sign --yes "${REF}"

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.digest.outputs.ref }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true

      - name: Attest SBOM with cosign (keyless)
        env:
          REF: ${{ steps.digest.outputs.ref }}
        run: |
          set -euo pipefail
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${REF}"

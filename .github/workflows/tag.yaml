# Self-contained Tag workflow.
# Upstream crossplane-contrib/provider-workflows tag.yml no longer exposes
# workflow_call (main @ 8d50ecf and the previously pinned 451c4dc both ship a
# standalone workflow_dispatch-only job). Calling it as a reusable workflow
# fails; v0.1.0 was tagged manually for that reason. This inlines the same
# create-tag steps so `workflow_dispatch` works again from this repo.
name: Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.1.0)"
        required: true
      message:
        description: "Tag message"
        required: true

# Scorecard Token-Permissions: deny-by-default at the workflow root; the
# create-tag job elevates contents:write only for the tag push.
permissions:
  contents: read

jobs:
  create-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4

      - name: Create Tag
        uses: negz/create-tag@39bae1e0932567a58c20dea5a1a0d18358503320 # v1
        with:
          version: ${{ github.event.inputs.version }}
          message: ${{ github.event.inputs.message }}
          token: ${{ secrets.GITHUB_TOKEN }}

name: Docs Sync

on:
  push:
    branches:
      - main
      - release-*
    paths:
      - 'apis/**'
      - 'docs/api/**'
      - '.crd-ref-docs.yaml'
      - 'hack/check-api-docs.sh'
      - 'Makefile'
      - '.github/workflows/docs-sync.yml'
  pull_request:
    paths:
      - 'apis/**'
      - 'docs/api/**'
      - '.crd-ref-docs.yaml'
      - 'hack/check-api-docs.sh'
      - 'Makefile'
      - '.github/workflows/docs-sync.yml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check-api-docs:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # go.mod pins `toolchain go1.26.5`; with GOTOOLCHAIN=auto this
          # base version transparently fetches the module's toolchain.
          go-version: '1.25'
          check-latest: true

      - name: Check API docs sync
        # Regenerates docs/api/ and fails if the committed output drifts.
        run: make check-api-docs

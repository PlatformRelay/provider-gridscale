name: Gitleaks

on:
  push:
    branches:
      - main
      - release-*
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

env:
  # Pin the gitleaks binary to a released version. gitleaks itself is MIT;
  # we intentionally run the binary directly rather than gitleaks-action@v2,
  # which enforces a paid GITLEAKS_LICENSE gate on org-owned repositories.
  GITLEAKS_VERSION: '8.30.1'
  # Checksum of gitleaks_8.30.1_linux_x64.tar.gz (verified against the release).
  GITLEAKS_SHA256: '551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb'

jobs:
  gitleaks:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so gitleaks scans every commit on the branch/PR.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}"
          curl -fsSL -o "${tarball}" "${url}"
          echo "${GITLEAKS_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "${tarball}" gitleaks
          install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        run: |
          gitleaks detect --config=.github/gitleaks.toml --redact -v

name: CodeQL

on:
  push:
    branches:
      - main
      - release-*
  pull_request:
    branches:
      - main
  schedule:
    # Weekly, Mondays 08:00 UTC.
    - cron: '0 8 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (go)
    runs-on: ubuntu-24.04
    permissions:
      # Required to upload CodeQL results to the code-scanning dashboard.
      security-events: write
      contents: read
      # Required for workflow status when the repo is private.
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # go.mod pins `toolchain go1.26.5`; with GOTOOLCHAIN=auto this
          # base version transparently fetches the module's toolchain.
          go-version: '1.25'
          check-latest: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:go"

name: Feature request
description: Suggest a new resource, field, or capability for provider-gridscale
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Because this is a generated Upjet
        provider, new resources and fields usually come from the upstream
        Terraform provider surface — please mention the gridscale resource you
        have in mind if you know it.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case and the gap in the current provider.
      placeholder: I need to manage gridscale <X>, but no CRD exists for it...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? A new managed resource, field, reference, or behavior.
    validations:
      required: true
  - type: input
    id: resource
    attributes:
      label: Target resource / CRD or gridscale API object
      description: The Crossplane kind and/or the gridscale/Terraform resource this relates to.
      placeholder: "gridscale_object_storage / ObjectStorage"
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have evaluated.
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links to gridscale docs, upstream Terraform resources, or related issues.
    validations:
      required: false

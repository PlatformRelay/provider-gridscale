# OpenSpec project config — injected into every planning request (OPSX / spec-driven workflow).
# Ported from kaddy's OpenSpec setup and adapted for a Crossplane/Upjet provider.
schema: spec-driven

context: |
  Project: provider-gridscale (github.com/PlatformRelay/provider-gridscale) — a Crossplane
  provider for gridscale, generated with Upjet from the terraform-provider-gridscale (v2.3.0).
  It exposes XRM-conformant managed resources (32 resources across 8 API groups) for the
  gridscale IaaS/PaaS API. Origin: this repo is epic E6g of the sibling `kaddy` platform, but
  it is a fully independent OSS product with its own backlog, versioning, and release cadence
  (workspace rule: repos never cross-reference — kaddy's "E6g" is its external handle for us).

  Nature of the code: the API types (apis/**/zz_*.go), controllers (internal/controller/**),
  and CRDs (package/crds/**) are GENERATED by Upjet — never hand-edit them. Human-authored
  surface is small and high-leverage: config/ (external-name resolution, kind/field overrides,
  provider wiring), examples/ (which double as uptest e2e fixtures), package/crossplane.yaml
  (Marketplace metadata), extensions/ (icon, readme, release-notes), and docs/CI/governance.
  Maturity work therefore lives almost entirely OUTSIDE the generated tree.

  Goal of the current backlog (E1–E6): take a freshly-scaffolded, untested provider to a
  professional OSS standard — testable, documented, branded, CI-hardened, and governed — at
  parity with sibling repos kollect and mkurator, adapted to provider shape.

  Conventions:
  - Commits: :gitmoji: type(scope): summary — ASCII shortcode only; no Unicode emoji;
    no AI co-author trailers; never modify git config. One logical change per commit.
  - Merge: rebase-and-merge only (linear history; no squash, no merge commits).
  - TDD: mandatory for hand-authored Go (config/, hack/ scripts). Generated code is exempt
    from TDD but MUST stay green (make reviewable) and is covered by uptest at the e2e tier.
  - Spec-driven: every implementation lane references an OpenSpec change under openspec/changes/.
  - Committed harness: unlike kaddy, this repo COMMITS its agent files (AGENTS.md, openspec/,
    agent-context/, docs/) — for a public provider, a visible spec-driven workflow is itself a
    maturity signal. Only .claude/ (local coordination) stays gitignored.

  Test taxonomy (provider-shaped — replaces kaddy's L0–L4 tofu/chainsaw pyramid):
  - U  (unit)  : `go test` on hand-authored packages — config/external_name.go, config/gridscale.go
                 overrides, hack/ helpers. Fast, no cluster, no cloud.
  - E  (e2e)   : uptest — an annotated example manifest applied against a real gridscale API,
                 asserted ready/deletable. Gated behind creds; runs on /test-examples + nightly.
  - M  (meta)  : structural/governance check — a file or CI job exists, a linter passes, a
                 generated artifact is in sync (make check-diff, crddiff).
  - D  (doc)   : generated documentation matches source (crd-ref-docs / examples output diff).
  Every REQ carries exactly one **Test:** (artifact path) and one **Verify:** (command).
  Gate: `make test.spec` (structural REQ↔Test↔Verify coverage). Epic EXIT: STRICT_TEST_FILES=1.

rules:
  proposal:
    - State problem, scope, and non-goals explicitly.
    - Link the ADR(s) that justify the approach and the decisions.md entries consumed.
    - Name the counterpoints considered (adversarial collaboration).
    - Distinguish generated surface (do-not-edit) from hand-authored surface being changed.
  specs:
    - Use Given / When / Then for behavioural requirements.
    - Map every requirement to an epic ID (E1, E2, …) and story ID (E2-S03).
    - Assign stable REQ IDs (REQ-E2-S03-01) each with **Test:** (artifact path) and **Verify:** (command).
    - Tag **Level:** U | E | M | D. One test artifact per REQ — no exceptions.
    - Prefer asserting on the small hand-authored surface; use E-level only where a real API round-trip is the requirement.
  design:
    - Prefer mermaid diagrams for flows; reference concrete existing paths (config/, examples/, package/).
    - Document the fallback path for any risky dependency (e.g. BSL terraform pin, gridscale API limits).
    - Never propose editing zz_*.go / generated controllers — route changes through config/ or codegen inputs.
  tasks:
    - Vertical slices; each task independently verifiable and shippable.
    - Include the gate command(s) that must pass before PR.
    - List "add failing test" before "implement" for each story that touches hand-authored code.

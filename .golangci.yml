version: "2"
output:
  formats:
    text:
      path: stdout
linters:
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - contextcheck
    - durationcheck
    - errcheck
    - errchkjson
    - errorlint
    - exhaustive
    - gocheckcompilerdirectives
    - gochecksumtype
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - gosmopolitan
    - govet
    - ineffassign
    - loggercheck
    - makezero
    - misspell
    - musttag
    - nakedret
    - nilerr
    - nilnesserr
    - noctx
    - prealloc
    - protogetter
    - reassign
    - recvcheck
    - rowserrcheck
    - spancheck
    - sqlclosecheck
    - staticcheck
    - testifylint
    - unconvert
    - unparam
    - unused
    - zerologlint
  settings:
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - io/ioutil.ReadFile
        - io.Copy(*bytes.Buffer)
        - io.Copy(os.Stdout)
    goconst:
      min-len: 3
      min-occurrences: 5
    gocritic:
      enabled-tags:
        - performance
      settings:
        captLocal:
          paramsOnly: true
        rangeValCopy:
          sizeThreshold: 32
    gocyclo:
      min-complexity: 10
    lll:
      tab-width: 1
    nakedret:
      max-func-lines: 30
    prealloc:
      simple: true
      range-loops: true
      for-loops: false
    unparam:
      check-exported: false
  exclusions:
    generated: lax
    rules:
      # gosec (notably G101 hardcoded-credentials and G104 unhandled-errors) is
      # suppressed ONLY here, for test files, and via the generated-code path
      # exclusions below ((^|/)zz_.*\.go$ covers all upjet-generated files,
      # including zz_*_terraformed.go). Tests routinely use dummy credentials
      # and ignore errors for brevity, and generated code is not ours to fix.
      # Hand-authored code (config/, internal/, cmd/, hack/) has G101/G104
      # fully enforced — do NOT re-add a global text: 'G101:'/'G104:' rule
      # (SEC-1 / E5-S07).
      - linters:
          - dupl
          - errcheck
          - gocyclo
          - gosec
          - scopelint
          - unparam
        path: _test(ing)?\.go
      - linters:
          - gocritic
        path: _test\.go
        text: (unnamedResult|exitAfterDefer)
      - linters:
          - gocritic
        text: '(hugeParam|rangeValCopy):'
      - linters:
          - staticcheck
        text: 'SA3000:'
      # G101 false positive: EnableAlphaExternalSecretStores is a feature-flag
      # identifier constant, not a hardcoded credential. Narrowly scoped so
      # gosec G101 stays active on all other production code.
      - linters:
          - gosec
        path: internal/features/features\.go
        text: 'G101:'
    paths:
      - (^|/)zz_.*\.go$
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/PlatformRelay/provider-gridscale
  exclusions:
    generated: lax
    paths:
      - (^|/)zz_.*\.go$
      - third_party$
      - builtin$
      - examples$

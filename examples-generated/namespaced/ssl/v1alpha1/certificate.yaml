apiVersion: ssl.gridscale.m.platformrelay.io/v1alpha1
kind: Certificate
metadata:
  annotations:
    meta.upbound.io/example-id: ssl/v1alpha1/certificate
  labels:
    testing.upbound.io/example-name: ssl-certificate-john
  name: ssl-certificate-john
  namespace: crossplane-system
spec:
  forProvider:
    leafCertificateSecretRef:
      key: example-key
      name: example-secret
    name: john's computer
    privateKeySecretRef:
      key: example-key
      name: example-secret
    timeouts:
    - create: 10m

---

apiVersion: gridscale.gridscale.m.platformrelay.io/v1alpha1
kind: Loadbalancer
metadata:
  annotations:
    meta.upbound.io/example-id: ssl/v1alpha1/certificate
  labels:
    testing.upbound.io/example-name: lb-john
  name: lb-john
  namespace: crossplane-system
spec:
  forProvider:
    algorithm: leastconn
    backendServer:
    - hostSelector:
        matchLabels:
          testing.upbound.io/example-name: server
      weight: 100
    forwardingRule:
    - certificateUuidSelector:
        matchLabels:
          testing.upbound.io/example-name: ssl-certificate-john
      listenPort: 80
      mode: http
      targetPort: 80
    labels: []
    listenIpv4UuidSelector:
      matchLabels:
        testing.upbound.io/example-name: lb
    listenIpv6UuidSelector:
      matchLabels:
        testing.upbound.io/example-name: lb
    name: john's lb
    redirectHttpToHttps: false
    timeouts:
    - create: 10m

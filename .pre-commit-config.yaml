# Pre-commit hooks mirror CI checks where possible. Install with:
#   pre-commit install
---
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        args: [--config=.github/gitleaks.toml]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^vendor/
      - id: end-of-file-fixer
        exclude: ^vendor/
      - id: check-yaml
        # Skip generated CRDs / package manifests and Go template files that are
        # not valid standalone YAML.
        exclude: ^(vendor/|package/crds/|.*\.tmpl$)
      - id: check-added-large-files
        args: [--maxkb=1000]

  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-imports

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]
        files: ^(hack/|cluster/).*\.sh$

  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint (make lint)
        entry: make lint
        language: system
        types: [go]
        pass_filenames: false
        require_serial: true

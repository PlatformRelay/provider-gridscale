# git-cliff configuration — https://git-cliff.org/docs/configuration
# Commit subjects use Conventional Commits with a leading gitmoji token
# (e.g. ":sparkles: feat(scope): summary", ":lock: fix: ...",
# ":white_check_mark: test: ...", ":memo: docs: ...").

[remote.github]
owner = "platformrelay"
repo = "provider-gridscale"

[changelog]
header = """
# Changelog

All notable changes to this project are documented here.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
Release notes are generated from [Conventional Commits](https://www.conventionalcommits.org/)
(with a leading gitmoji token) on the default branch using
[git-cliff](https://git-cliff.org/).

"""
body = """
{% if version -%}
  {% if previous.version -%}
    ## [{{ version | trim_start_matches(pat="v") }}](https://github.com/platformrelay/provider-gridscale/compare/{{ previous.version }}..{{ version }}) - {{ timestamp | date(format="%Y-%m-%d") }}
  {% else -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
  {% endif -%}
{% else -%}
  ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
  ### {{ group | upper_first }}
  {% for commit in commits %}
    - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
      {% if commit.breaking %}[**breaking**] {% endif %}\
      {{ commit.message | upper_first }} \
      {% if commit.remote.pr_number %}([#{{ commit.remote.pr_number }}](https://github.com/platformrelay/provider-gridscale/pull/{{ commit.remote.pr_number }})){% endif %}\
      [{{ commit.id | truncate(length=7, end="") }}](https://github.com/platformrelay/provider-gridscale/commit/{{ commit.id }})
  {% endfor %}
{% endfor %}
"""
trim = true
output = "CHANGELOG.md"

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
tag_pattern = "v[0-9].*"
sort_commits = "newest"

# :sparkles: feat(scope): summary  ->  feat(scope): summary
# Strip the leading gitmoji token so the Conventional-Commit parsers below match.
commit_preprocessors = [
  { pattern = '^:[a-z0-9_]+: ', replace = "" },
]

commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  # Breaking changes for any type: anchor the conventional-commit "!" marker to
  # the type/scope at the start of the subject (e.g. "chore(api)!:"). Anchoring
  # is required so an unanchored "!" in a body doesn't misclassify unrelated
  # commits as breaking.
  { message = '^[a-z]+(\(.+\))?!:', group = "Breaking Changes" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Tests" },
  { message = "^ci", group = "CI/CD" },
  { message = "^build", group = "Build System" },
  { message = "^chore", group = "Miscellaneous" },
  { message = "^style", group = "Styling" },
  { message = "^revert", group = "Reverts" },
]
